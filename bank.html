<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거래내역조회</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body class="flex justify-center min-h-screen">

  <div class="w-full max-w-md bg-white min-h-screen shadow-lg flex flex-col justify-between relative pb-10">
    
    <div class="h-6 bg-white"></div>

    <header class="flex items-center justify-between px-4 py-3 bg-white">
      <button class="material-icons text-gray-700 text-2xl">chevron_left</button>
      <h1 class="text-lg font-semibold text-gray-800">거래내역조회</h1>
      <button class="text-sm text-blue-500 font-medium">관리</button>
    </header>

    <section class="px-4 py-2 bg-white">
      <div class="flex items-center justify-between text-xs text-gray-500 mb-3">
        <button class="material-icons text-xl text-gray-600">search</button>
        <div class="flex items-center space-x-1 cursor-pointer">
          <span>3개월 · 전체 · 최신순</span>
          <span class="material-icons text-sm">tune</span>
        </div>
      </div>
      
      <div class="flex items-center justify-between pt-1 pb-3 border-b border-gray-100">
        <span class="text-sm font-medium text-gray-700">2026.03.17 ~ 2026.06.17</span>
        <div class="flex items-center space-x-2">
          <span class="text-xs text-gray-500">잔액 표시</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" checked class="sr-only peer">
            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
          </label>
        </div>
      </div>
    </section>

    <main class="flex-1 overflow-y-auto px-4 py-2 space-y-6">

      <div>
        <div class="text-xs text-gray-400 mb-2">6월 10일 · 12:40:28</div>
        <div class="flex justify-between items-start mb-4">
          <div class="text-base font-medium text-gray-800">SMS수수료</div>
          <div class="text-right">
            <span class="text-base font-bold text-gray-900">-900원</span>
            <div class="text-xs text-gray-400 mt-0.5">잔액 3,954,350원</div>
          </div>
        </div>

        <div class="text-xs text-gray-400 mb-2 mt-6">6월 10일 · 03:30:13</div>
        <div class="flex justify-between items-start">
          <div class="text-base font-medium text-gray-800">16회-서유현</div>
          <div class="text-right">
            <span class="text-base font-bold text-gray-900">-700,000원</span>
            <div class="text-xs text-gray-400 mt-0.5">잔액 3,955,250원</div>
          </div>
        </div>
      </div>

      <div class="pt-2">
        <div class="text-xs text-gray-400 mb-2">6월 9일 · 18:26:02</div>
        <div class="flex justify-between items-start">
          <div class="text-base font-medium text-gray-800">급여</div>
          <div class="text-right">
            <span class="text-base font-bold text-blue-600">+3,784,210원</span>
            <div class="text-xs text-gray-400 mt-0.5">잔액 4,655,250원</div>
          </div>
        </div>
      </div>

      <div class="pt-2">
        <div class="text-xs text-gray-400 mb-2">6월 5일 · 03:22:19</div>
        <div class="flex justify-between items-start mb-4">
          <div class="text-base font-medium text-gray-800">DB손01706</div>
          <div class="text-right">
            <span class="text-base font-bold text-gray-900">-16,190원</span>
            <div class="text-xs text-gray-400 mt-0.5">잔액 691,044원</div>
          </div>
        </div>

        <div class="text-xs text-gray-400 mb-2 mt-6">6월 5일 · 03:22:19</div>
        <div class="flex justify-between items-start">
          <div class="text-base font-medium text-gray-800">DB손01706</div>
          <div class="text-right">
            <span class="text-base font-bold text-gray-900">-112,770원</span>
            <div class="text-xs text-gray-400 mt-0.5">잔액 887,230원</div>
          </div>
        </div>
      </div>

    </main>

    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-gray-900 rounded-full opacity-80"></div>
  </div>

</body>
</html>
